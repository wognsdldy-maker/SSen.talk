<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="https://fav.farm/💬">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쎈talk - 커뮤니케이션 센터 소통 창구</title>
    <style>
        :root {
            --primary-color: #3CC1CF;
            --primary-hover: #2FAAB7;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .description {
            font-size: 14px;
            color: #64748b;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #f1f5f9;
            padding: 14px;
            border-radius: 8px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            line-height: 1.5;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .count-wrapper {
            text-align: right;
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background-color: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            max-width: 360px;
            width: 100%;
        }

        .modal-content p {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .modal-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
        }
        
.icon-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
}
.center-icon {
    width: 56px;
    height: 56px;
    color: var(--primary-color);
}

    </style>
</head>
<body>

    <div class="container">
        <div class="icon-wrapper">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="center-icon">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 0 1-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8Z" />
    </svg>
</div>

        <h1>'함께 만드는 우리센터'<br>쎈talk</h1>
        <p class="description">LG에너지솔루션 커뮤니케이션 센터 조직문화 개선을 위한<br>의견 수렴 플랫폼입니다.<br>작성하신 내용은 100% 익명으로 안전하게 처리됩니다.</p>
        
        <form id="talkForm">
            <div class="form-group">
                <label>분류 (중복 선택 가능)</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="category" value="센터장님, 이것이 궁금해요!">
                        센터장님, 이것이 궁금해요!
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="category" value="더 나은 우리 센터를 위한 제안">
                        더 나은 우리 센터를 위한 제안
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="content">궁금한 사항 및 제안 내용</label>
                <textarea id="content" placeholder="의견을 입력해 주세요." maxlength="1000" required></textarea>
                <div class="count-wrapper"><span id="charCount">0</span>/1000</div>
            </div>

            <button type="submit" id="submitBtn">의견 등록하기</button>
        </form>
    </div>

    <div id="customModal" class="modal">
        <div class="modal-content">
            <p id="modalMessage">의견이 정상적으로 접수되었습니다.</p>
            <button class="modal-btn" onclick="closeModal()">확인</button>
        </div>
    </div>

    <script>
        // ⚠️ 방금 메모장에 복사해 둔 구글 웹 앱 URL 주소를 아래 작은따옴표 안에 붙여넣으세요.
        const GOOGLE_SCRIPT_URL = 'AKfycbw_GIDjYLcS9IwKDpGj3HKAgtxuoR4dSsgtH5vwc7bNWiho12T6Z33T2Y8AwIrhoPQp';

        const textarea = document.getElementById('content');
        const charCount = document.getElementById('charCount');
        const form = document.getElementById('talkForm');
        const submitBtn = document.getElementById('submitBtn');
        const modal = document.getElementById('customModal');
        const modalMessage = document.getElementById('modalMessage');

        textarea.addEventListener('input', () => {
            charCount.textContent = textarea.value.length;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const checkedBoxes = document.querySelectorAll('input[name="category"]:checked');
            if (checkedBoxes.length === 0) {
                showModal('분류를 최소 한 개 이상 선택해 주세요.');
                return;
            }

            const categories = Array.from(checkedBoxes).map(box => box.value);
            const contentVal = textarea.value.trim();

            if (!contentVal) {
                showModal('내용을 입력해 주세요.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '등록 중...';

            const now = new Date();
            const kstOffset = 9 * 60 * 60 * 1000;
            const kstDate = new Date(now.getTime() + kstOffset);
            const timestamp = kstDate.toISOString().replace('T', ' ').substring(0, 19);

            const payload = {
                timestamp: timestamp,
                category: categories,
                content: contentVal
            };

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const result = await response.text();

                if (result === 'Success') {
                    showModal('의견이 성공적으로 접수되었습니다.');
                    form.reset();
                    charCount.textContent = '0';
                } else {
                    showModal('접수 중 오류가 발생했습니다. 다시 시도해 주세요.');
                }
            } catch (error) {
                showModal('네트워크 오류가 발생했습니다.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '의견 등록하기';
            }
        });

        function showModal(msg) {
            modalMessage.innerText = msg;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }
    </script>
</body>
</html>
